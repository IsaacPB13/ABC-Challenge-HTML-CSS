<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ABC-Challenge</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body> 
    <div class="row">
        <div class="col">
            <h1 class="azul">A</h1>
            <br>
            <h3>A de: Almanaque</h3>
        </div>
        <div class="col">
            <img src="https://www.shutterstock.com/image-vector/desktop-calendar-cartoon-sticker-illustration-600nw-2664765163.jpg" alt="Almanaque" width="200" height="100">
        </div>
    </div>
    <div class="row">
        <div class="col">
            <h1>B</h1>
            <br>
            <h3>B de: Ballesta</h3>
        </div>
        <div class="col">
            <img src="https://www.archerytagbarcelona.com/wp-content/uploads/2017/07/ballesta-900x570.jpg" alt="Ballesta" width="200" height="100">
        </div>
    </div>
    <div class="row">
        <div class="col">
            <h1>C</h1>
            <br>
            <h3>C de: Carro</h3>
        </div>
        <div class="col">
            <img src="https://upload.wikimedia.org/wikipedia/commons/c/c1/Porsche_992_GT3_1X7A0323.jpg" alt="Carro" width="200" height="100">
        </div>
    </div>
    <div class="row">
        <div class="col">
            <h1 class="azul">D</h1>
            <br>
            <h3>D de: Dado</h3>
        </div>
        <div class="col">
            <img src="https://m.media-amazon.com/images/I/61nzOwHYN2L.jpg" alt="Dado" width="200" height="100">
        </div>
    </div>
    <div class="row">
        <div class="col">
            <h1>E</h1>
            <br>
            <h3>E de: Elefante</h3>
        </div>
        <div class="col">
            <img src="https://img.freepik.com/vector-gratis/simpatico-dibujo-animado-elefante-aislado_1308-140130.jpg?semt=ais_hybrid&w=740&q=80" alt="" width="200" height="100">
        </div>
    </div>
    <div class="row">
        <div class="col">
            <h1>F</h1>
            <br>
            <h3>F de: Fantasma</h3>
        </div>
        <div class="col">
            <img src="https://img.freepik.com/foto-gratis/representacion-lindo-icono-fantasma-dibujos-animados_23-2152026177.jpg?semt=ais_hybrid&w=740&q=80" alt="Fantasma" width="200" height="100">
        </div>
    </div>
    <div class="row">
        <div class="col">
            <h1 class="azul">G</h1>
            <br>
            <h3>G de: Ganado</h3>
        </div>
        <div class="col">
            <img src="https://agroregion.com/files/image/vaca.jpg" alt="Ganado" width="200" height="100">
        </div>
    </div>
</body>
</html>
